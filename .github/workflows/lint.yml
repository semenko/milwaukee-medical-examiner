name: Lint

on:
  push:
    paths:
      - '*.html'
      - '*.js'
      - 'eslint.config.js'
      - 'package.json'
  pull_request:
    paths:
      - '*.html'
      - '*.js'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run lint
